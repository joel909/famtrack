<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#3B82F6" opacity="0.1"/>
  
  <!-- Wallet main shape -->
  <rect x="12" y="22" width="40" height="24" rx="3" fill="#3B82F6" stroke="#1E40AF" stroke-width="1.5"/>
  
  <!-- Wallet shine/highlight -->
  <rect x="12" y="22" width="40" height="8" rx="3" fill="#60A5FA" stroke="#1E40AF" stroke-width="1.5"/>
  
  <!-- Chart bars (inside wallet) -->
  <rect x="18" y="32" width="4" height="10" fill="#10B981" opacity="0.9"/>
  <rect x="26" y="28" width="4" height="14" fill="#10B981" opacity="0.9"/>
  <rect x="34" y="30" width="4" height="12" fill="#10B981" opacity="0.9"/>
  <rect x="42" y="26" width="4" height="16" fill="#10B981" opacity="0.9"/>
  
  <!-- Rupee symbol or accent -->
  <circle cx="50" cy="20" r="6" fill="#F59E0B"/>
  <text x="50" y="23" font-size="10" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">₹</text>
</svg>
